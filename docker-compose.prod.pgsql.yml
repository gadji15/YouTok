services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-backend}
      POSTGRES_USER: ${DB_USERNAME:-backend}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-backend} -d ${DB_DATABASE:-backend} -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  pg_data:
